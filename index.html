<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <title>Noughts and Crosses</title>
</head>
<body>
    <div><h1>Noughts and Crosses</h1></div>
    <div id="weather">Loading the weather...</div>
    <div id="background">
    <div id="welcome">Welcome: <span>User</span></div>
    <button class="start-game-btn">Start Game</button>
    <div class="grid is-hidden">
        <div class="cell is-hidden"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell is-hidden"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell is-hidden"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div id="Users">User</div>
    <button id="reset-button">Reset Game</button>
    <div id="card-players">
    <div class="player-one is-hidden"><h2></h2></div>
    <div class="score is-hidden">Player one Score</div>
    <div class="player-two is-hidden"><h2></h2></div>
    <div class="score is-hidden">Player two Score</div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
