<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style.css">
    <title>Tic Tak Toe</title>
</head>
<body>
    <div><h1>Noughts and Crosses</h1></div>
    <div id="weather">Loading the weather...</div>
    <div id="background">
    <div id="welcome">Welcome: <span>User</span></div>
    <div id="trophy"></div>
    <button id="start-game-btn">Start Game</button>
    <div class="grid is-hidden">
        <div class="cell is-hidden"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell is-hidden"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell is-hidden"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div id="Users">User</div>
    <button id="reset-button">Reset Game</button>
    <div id="card-players">
    <div class="player-one is-hidden"><h2></h2></div>
    <div class="score is-hidden">Player one Score</div>
    <span id="score-one"></span>
    <div class="player-two is-hidden"><h2></h2></div>
    <div class="score is-hidden">Player two Score</div>
    <span id="score-two"></span>
    </div>
    </div>
    <script src="buttons.js"></script>
    <script src="gameLogic.js"></script>
    <script src="api.js"></script>
</body>
</html>
